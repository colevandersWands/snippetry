<!-- Load d3.js -->
<script src="./d3.min.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>

<script type="module">
  const [snippets, tags, links] = await Promise.all([
    fetch('../../public/data/snippets.json').then((res) => res.json()),
    fetch('../../public/data/tags.json').then((res) => res.json()),
    fetch('../../public/data/links.json').then((res) => res.json()),
  ]);

  const nodes = [...snippets, ...tags.map((tag) => ({ title: tag }))];

  const data = { nodes, links };

  // set the dimensions and margins of the graph
  var margin = { top: 10, right: 30, bottom: 30, left: 40 },
    width = 800 - margin.left - margin.right,
    height = 800 - margin.top - margin.bottom;

  // append the svg object to the body of the page
  var svg = d3
    .select('#my_dataviz')
    .append('svg')
    .attr('width', width + margin.left + margin.right)
    .attr('height', height + margin.top + margin.bottom)
    .append('g')
    .attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

  // Initialize the links
  var link = svg
    .selectAll('line')
    .data(data.links)
    .enter()
    .append('line')
    .style('stroke', '#aaa');

  // Initialize the nodes
  var node = svg
    .selectAll('circle')
    .data(data.nodes)
    .enter()
    .append('circle')
    .attr('r', 20)
    .style('fill', '#69b3a2');

  // Let's list the force we wanna apply on the network
  var simulation = d3
    .forceSimulation(data.nodes) // Force algorithm is applied to data.nodes
    .force(
      'link',
      d3
        .forceLink() // This force provides links between nodes
        .id((d) => d.id) // This provide  the id of a node
        .links(data.links), // and this the list of links
    )
    .force('charge', d3.forceManyBody().strength(-400)) // This adds repulsion between nodes. Play with the -400 for the repulsion strength
    .force('center', d3.forceCenter(width / 2, height / 2)) // This force attracts nodes to the center of the svg area
    .on('end', ticked);

  // This function is run at each iteration of the force algorithm, updating the nodes position.
  function ticked() {
    link
      .attr('x1', function (d) {
        return d.from.x;
      })
      .attr('y1', function (d) {
        return d.from.y;
      })
      .attr('x2', function (d) {
        return d.to.x;
      })
      .attr('y2', function (d) {
        return d.to.y;
      });

    node
      .attr('cx', function (d) {
        return d.x;
      })
      .attr('cy', function (d) {
        return d.y;
      });
  }
</script>
