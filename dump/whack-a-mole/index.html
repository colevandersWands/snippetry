<!-- game play:

  if you don't whack the mole, it stays
  when all the squares are full, game over
 
-->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Whack A Mole!</title>
    <style>
      html {
        box-sizing: border-box;
        font-size: 10px;
      }

      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }

      body {
        padding: 0;
        margin: 0;
        font-family: 'Amatic SC', cursive;
      }

      h1 {
        text-align: center;
        font-size: 10rem;
        line-height: 1;
        margin-bottom: 0;
      }

      .game {
        width: 600px;
        height: 400px;
        display: flex;
        flex-wrap: wrap;
        margin: 0 auto;
      }

      .hole {
        flex: 1 0 33.33%;
        overflow: hidden;
        position: relative;
      }

      .hole:after {
        display: block;
        background: url(dirt.svg) bottom center no-repeat;
        background-size: contain;
        content: '';
        width: 100%;
        height: 70px;
        position: absolute;
        z-index: 2;
        bottom: -30px;
      }

      .mole {
        background: url('mole.svg') bottom center no-repeat;
        background-size: 60%;
        position: absolute;
        top: 100%;
        width: 100%;
        height: 100%;
        transition: all 0.4s;
      }

      .hole.up .mole {
        top: 0;
      }

      .body {
        display: grid;
        gap: 1px;
        grid-template-columns: repeat(3, 1fr);
        height: 100vh;
        width: 100vw;
      }

      .part {
        height: 33.33%;
        width: 33.33%;

        text-align: center;

        font-size: 7em;
      }
    </style>
  </head>
  <body>
    <div class="body"></div>

    <script>
      const parts = ['👁️', '🦵', '🫀', '🦴', '👂', '🦷', '🫁', '🧠', '👅'];
      // shuffle parts
      // render each to a div with class "part" and id ${index}
      // append to id="body"

      const holes = document.querySelectorAll('.hole');
      const moles = document.querySelectorAll('.mole');

      let lastHole;
      let timeUp = false;

      const randomTime = (min, max) => Math.round(Math.random() * (max - min) + min);

      function randomHole(holes) {
        const idx = Math.floor(Math.random() * holes.length);
        const hole = holes[idx];
        if (hole === lastHole) {
          console.log('Ah nah thats the same one bud');
          return randomHole(holes);
        }
        lastHole = hole;
        return hole;
      }

      function peep() {
        const time = randomTime(500, 1500);
        const hole = randomHole(holes);
        hole.classList.add('up');
        setTimeout(() => {
          hole.classList.remove('up');
          if (!timeUp) peep();
        }, time);
      }

      function startGame() {
        timeUp = false;
        peep();
        setTimeout(() => (timeUp = true), 10000);
      }

      const bonk = (e) => e.target.parentNode.classList.remove('up');

      moles.forEach((mole) => mole.addEventListener('click', bonk));

      alert('instructions');
      startGame();
    </script>
  </body>
</html>
