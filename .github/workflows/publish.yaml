name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --ignore-scripts

      - run: npm run publish

      - name: Stage site
        run: |
          mkdir _site
          cp index.html origin-story.html print.html snips.html _site/
          cp -r public _site/
          rsync -a \
            --exclude='*.draft.*' \
            --exclude='*.sandbox.*' \
            --exclude='*.notes.*' \
            --exclude='*.spec.*' \
            --exclude='*.mp3' \
            --exclude='*.excalidraw' \
            --exclude='.DS_Store' \
            snippets/ _site/snippets/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
